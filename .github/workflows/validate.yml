name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Build
        run: npm run build

      - name: Verify API routes
        run: |
          test -f app/api/mcp/route.ts && echo "✓ MCP route exists"
          test -f app/api/recent-failures/route.ts && echo "✓ recent-failures route exists"
          test -f "app/api/transaction/[signature]/route.ts" && echo "✓ transaction route exists"

  protocol-decoders:
    name: Protocol decoders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify decoders are registered
        run: |
          DECODER_COUNT=$(grep -cE "^const [A-Z_]+_PROGRAM_ID" lib/parser/protocols/index.ts)
          echo "Found $DECODER_COUNT protocol ID definitions"
          if [ "$DECODER_COUNT" -lt 7 ]; then
            echo "::error::Expected at least 7 decoders, got $DECODER_COUNT"
            exit 1
          fi
          echo "✓ $DECODER_COUNT decoders registered"

  docs:
    name: Docs sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md && echo "✓ README.md"
          test -f CONTRIBUTING.md && echo "✓ CONTRIBUTING.md"
          test -f LICENSE && echo "✓ LICENSE"
          test -f CHANGELOG.md && echo "✓ CHANGELOG.md"
          test -f .github/FUNDING.yml && echo "✓ FUNDING.yml"
