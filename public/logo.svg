<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="SORTIE">
  <!-- Dark base -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>

  <!-- Outer scope ring (low opacity) -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#14F195" stroke-width="1.25" opacity="0.35"/>

  <!-- Inner scope ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#14F195" stroke-width="1.5" opacity="0.7"/>

  <!-- Crosshairs (subtle tick marks at N/E/S/W) -->
  <g stroke="#14F195" stroke-width="1" opacity="0.45">
    <line x1="16" y1="2" x2="16" y2="5.5"/>
    <line x1="16" y1="26.5" x2="16" y2="30"/>
    <line x1="2" y1="16" x2="5.5" y2="16"/>
    <line x1="26.5" y1="16" x2="30" y2="16"/>
  </g>

  <!-- Diagonal "sortie" chevron (forward arrow) -->
  <path d="M 11 22 L 17 14" stroke="#9945FF" stroke-width="1.75" stroke-linecap="round" fill="none"/>
  <path d="M 14 14 L 17 14 L 17 17" stroke="#9945FF" stroke-width="1.75" stroke-linecap="round" fill="none"/>

  <!-- Detected signal (the failure) -->
  <circle cx="22" cy="11" r="2" fill="#ef4444"/>
  <circle cx="22" cy="11" r="4.5" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.5"/>
</svg>
